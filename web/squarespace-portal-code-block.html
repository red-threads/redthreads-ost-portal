<!-- /portal PAGE Code Block - Fullscreen Apps Script + branded token passthrough + route sync + same-window checkout -->
<style>
  html,
  body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    height: 100% !important;
    overflow: hidden !important;
  }

  .rt-portal-fullscreen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 999999;
    background: #000;
  }

  .rt-portal-fullscreen iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: transparent;
  }

  .rt-portal-fullscreen iframe.is-hidden {
    display: none;
  }

  .rt-portal-mobile-block {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 72px 24px 32px;
    background: #000;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
    z-index: 4;
  }

  .rt-portal-mobile-block.is-hidden {
    display: none;
  }

  .rt-portal-mobile-card {
    width: min(420px, calc(100vw - 48px));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .rt-portal-mobile-logo {
    width: 68px;
    height: 68px;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0 0 18px rgba(225, 29, 72, 0.3));
  }

  .rt-portal-mobile-message {
    margin: 0;
    color: #f8fafc;
    font-size: 20px;
    line-height: 1.38;
    font-weight: 800;
  }

  .rt-portal-mobile-copy-wrap {
    width: 100%;
    display: grid;
    justify-items: center;
    gap: 9px;
    margin-top: 4px;
    min-width: 0;
  }

  .rt-portal-mobile-copy-wrap[hidden] {
    display: none;
  }

  .rt-portal-mobile-copy-label {
    margin: 0;
    color: #cbd5e1;
    font-size: 12px;
    line-height: 1.2;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .rt-portal-mobile-link {
    width: 100%;
    max-width: 100%;
    margin: 0;
    overflow: hidden;
    color: rgba(255, 255, 255, 0.92);
    font: 700 14px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .rt-portal-mobile-copy-button {
    width: min(100%, 320px);
    min-height: 44px;
    border: 1px solid rgba(225, 29, 72, 0.42);
    border-radius: 999px;
    padding: 10px 18px;
    background: linear-gradient(135deg, #e11d48, #be123c);
    color: #fff;
    font: 900 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    cursor: pointer;
    box-shadow: 0 18px 36px rgba(225, 29, 72, 0.22);
  }

  .rt-portal-mobile-copy-status {
    min-height: 18px;
    margin: 0;
    color: #cbd5e1;
    font-size: 13px;
    line-height: 1.35;
    font-weight: 700;
  }

  .rt-portal-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 42%, rgba(225, 29, 72, 0.18), transparent 34rem), rgba(0, 0, 0, 0.86);
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    transition: opacity 220ms ease, visibility 220ms ease;
    z-index: 2;
  }

  .rt-portal-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .rt-portal-loading-card {
    width: min(420px, calc(100vw - 48px));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 28px 24px;
    text-align: center;
  }

  .rt-portal-spinner {
    width: 72px;
    height: 72px;
    position: relative;
    display: grid;
    place-items: center;
    filter: drop-shadow(0 0 16px rgba(225, 29, 72, 0.36));
  }

  .rt-portal-spinner::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: conic-gradient(
      from 210deg,
      rgba(225, 29, 72, 0.16) 0deg,
      rgba(225, 29, 72, 0.28) 78deg,
      rgba(244, 63, 94, 0.96) 78deg,
      rgba(244, 63, 94, 0.96) 186deg,
      rgba(225, 29, 72, 0.16) 186deg,
      rgba(225, 29, 72, 0.16) 360deg
    );
    -webkit-mask: radial-gradient(circle, transparent 58%, #000 60%);
    mask: radial-gradient(circle, transparent 58%, #000 60%);
    animation: rtPortalSpin 1180ms linear infinite;
  }

  .rt-portal-spinner img {
    position: relative;
    z-index: 1;
    width: 38px;
    height: 38px;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    animation: rtPortalPulse 1200ms ease-in-out infinite;
  }

  .rt-portal-loading-title {
    margin: 0;
    color: #f8fafc;
    font-size: 24px;
    line-height: 1.25;
    font-weight: 800;
  }

  .rt-portal-loading-sub {
    margin: 0;
    color: #cbd5e1;
    font-size: 16px;
    line-height: 1.45;
    font-weight: 600;
  }

  @keyframes rtPortalSpin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes rtPortalPulse {
    0%,
    100% {
      transform: scale(0.96);
      opacity: 0.82;
    }

    50% {
      transform: scale(1.04);
      opacity: 1;
    }
  }
</style>

<div class="rt-portal-fullscreen">
  <div class="rt-portal-mobile-block is-hidden" id="rtPortalMobileBlock" role="status" aria-live="polite">
    <div class="rt-portal-mobile-card">
      <img class="rt-portal-mobile-logo" src="https://logos.redthreads.work/CALC_PORTAL/SMALL_ICON.png" alt="Red Threads">
      <p class="rt-portal-mobile-message">The Red Threads portal is not optimized for mobile use. Please access this portal on a computer.</p>
      <div class="rt-portal-mobile-copy-wrap" id="rtPortalMobileCopyWrap" hidden>
        <p class="rt-portal-mobile-copy-label">Portal link</p>
        <p class="rt-portal-mobile-link" id="rtPortalMobileLink" aria-label="Portal link"></p>
        <button class="rt-portal-mobile-copy-button" id="rtPortalMobileCopyButton" type="button">Copy link</button>
        <p class="rt-portal-mobile-copy-status" id="rtPortalMobileCopyStatus" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <div class="rt-portal-loading is-hidden" id="rtPortalLoading" role="status" aria-live="polite">
    <div class="rt-portal-loading-card">
      <div class="rt-portal-spinner" aria-hidden="true">
        <img src="https://logos.redthreads.work/CALC_PORTAL/SMALL_ICON.png" alt="">
      </div>
      <p class="rt-portal-loading-title" id="rtPortalLoadingTitle">Loading portal...</p>
      <p class="rt-portal-loading-sub">One moment while Red Threads opens your workspace.</p>
    </div>
  </div>

  <iframe
    id="rtPortalFrame"
    title="Red Threads Portal"
    allow="clipboard-read; clipboard-write"
    referrerpolicy="strict-origin-when-cross-origin"
    loading="eager"
  ></iframe>
</div>

<script>
  (function () {
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";

    var APP_URL = "https://script.google.com/macros/s/AKfycbz9qDgp65f5S3RWhSxGftioMXKKU9O1N0mpHh3waoKY2YyvE72F-cJk-0XYr5YXg4bw/exec";
    var queryParams = new URLSearchParams(window.location.search);
    var iframeParams = new URLSearchParams();
    var token = queryParams.get("t");
    var checkoutResult = queryParams.get("checkoutResult");
    var setupResult = queryParams.get("setupResult");
    var stripeSessionId = queryParams.get("stripeSessionId");
    var MOBILE_BLOCK_QUERY = "(max-width: 899px)";

    if (token) {
      iframeParams.set("t", token);
    }

    if (checkoutResult) {
      iframeParams.set("checkoutResult", checkoutResult);
    }

    if (setupResult) {
      iframeParams.set("setupResult", setupResult);
    }

    if (stripeSessionId) {
      iframeParams.set("stripeSessionId", stripeSessionId);
    }

    var iframe = document.getElementById("rtPortalFrame");
    var loading = document.getElementById("rtPortalLoading");
    var loadingTitle = document.getElementById("rtPortalLoadingTitle");
    var mobileBlock = document.getElementById("rtPortalMobileBlock");
    var mobileCopyWrap = document.getElementById("rtPortalMobileCopyWrap");
    var mobileLink = document.getElementById("rtPortalMobileLink");
    var mobileCopyButton = document.getElementById("rtPortalMobileCopyButton");
    var mobileCopyStatus = document.getElementById("rtPortalMobileCopyStatus");
    var shouldShowLoading = !!(token || checkoutResult || setupResult || stripeSessionId);

    function isMobileBlocked() {
      return !!(window.matchMedia && window.matchMedia(MOBILE_BLOCK_QUERY).matches);
    }

    function getCurrentPortalLink() {
      try {
        return String(window.location.href || "");
      } catch (error) {
        return "";
      }
    }

    function fallbackCopyLink() {
      if (mobileCopyStatus) {
        mobileCopyStatus.textContent = "Copy the link from your browser address bar and open it on your computer.";
      }
    }

    function syncMobileCopyLink() {
      var currentLink = getCurrentPortalLink();
      if (mobileLink) {
        mobileLink.textContent = currentLink;
        mobileLink.dataset.fullLink = currentLink;
        mobileLink.title = currentLink;
      }

      if (mobileCopyWrap) {
        mobileCopyWrap.hidden = !currentLink;
      }

      if (mobileCopyStatus) {
        mobileCopyStatus.textContent = "";
      }
    }

    function showMobileBlock() {
      syncMobileCopyLink();
      if (mobileBlock) {
        mobileBlock.classList.remove("is-hidden");
      }

      if (loading) {
        loading.classList.add("is-hidden");
      }

      if (iframe) {
        iframe.classList.add("is-hidden");
      }
    }

    function hideMobileBlock() {
      if (mobileBlock) {
        mobileBlock.classList.add("is-hidden");
      }

      if (iframe) {
        iframe.classList.remove("is-hidden");
      }
    }

    function startPortalFrame() {
      if (!iframe || iframe.dataset.rtPortalStarted === "1") {
        return;
      }

      iframe.dataset.rtPortalStarted = "1";

      if (shouldShowLoading && loading) {
        if (loadingTitle && token) {
          loadingTitle.textContent = "Loading project...";
        }

        loading.classList.remove("is-hidden");
      }

      if (shouldShowLoading) {
        iframe.addEventListener("load", hideLoading);
        window.setTimeout(hideLoading, 16000);
      }

      iframe.src = iframeParams.toString() ? APP_URL + "?" + iframeParams.toString() : APP_URL;
    }

    function hideLoading() {
      if (!loading || !shouldShowLoading) {
        return;
      }

      loading.classList.add("is-hidden");
      window.setTimeout(function () {
        if (loading && loading.parentNode) {
          loading.parentNode.removeChild(loading);
        }
      }, 260);
    }

    function syncMobileBlock() {
      if (isMobileBlocked()) {
        showMobileBlock();
        return;
      }

      hideMobileBlock();
      startPortalFrame();
    }

    function isAllowedAppsScriptOrigin(origin) {
      if (origin === "https://script.google.com") return true;
      if (origin === "https://script.googleusercontent.com") return true;
      return /^https:\/\/[a-z0-9-]+-script\.googleusercontent\.com$/i.test(String(origin || ""));
    }

    function isAllowedStripeHostedPaymentUrl(url) {
      try {
        var parsed = new URL(String(url || ""));
        var host = String(parsed.hostname || "").toLowerCase();
        return parsed.protocol === "https:" && (host === "stripe.com" || /\.stripe\.com$/i.test(host));
      } catch (error) {
        return false;
      }
    }

    function getPortalMessageParams(data) {
      var payload = data && typeof data.payload === "object" ? data.payload : {};
      var params = data && typeof data.params === "object" ? data.params : payload.params || {};
      return params && typeof params === "object" ? params : {};
    }

    function replacePortalRoute(params) {
      var nextParams = new URLSearchParams(window.location.search);
      var tokenValue = params.t || params.token || "";
      var checkoutValue = params.checkoutResult || "";
      var setupValue = params.setupResult || "";
      var sessionValue = params.stripeSessionId || "";

      if (tokenValue) {
        nextParams.set("t", String(tokenValue));
      }

      if (checkoutValue === "success" || checkoutValue === "cancel") {
        nextParams.set("checkoutResult", checkoutValue);
      } else {
        nextParams.delete("checkoutResult");
      }

      if (setupValue === "success" || setupValue === "cancel") {
        nextParams.set("setupResult", setupValue);
      } else {
        nextParams.delete("setupResult");
      }

      if (sessionValue) {
        nextParams.set("stripeSessionId", String(sessionValue));
      } else {
        nextParams.delete("stripeSessionId");
      }

      var nextUrl = window.location.pathname + (nextParams.toString() ? "?" + nextParams.toString() : "");
      window.history.replaceState({}, "", nextUrl);
    }

    window.addEventListener("message", function (event) {
      if (!event || !isAllowedAppsScriptOrigin(event.origin)) return;
      var data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.source !== "redthreads-portal") return;

      if (data.type === "RT_PORTAL_ROUTE_REPLACE") {
        replacePortalRoute(getPortalMessageParams(data));
        return;
      }

      if (data.type === "RT_PORTAL_NAVIGATE" && isAllowedStripeHostedPaymentUrl(data.url)) {
        window.location.assign(String(data.url));
      }
    });

    if (mobileCopyButton) {
      mobileCopyButton.addEventListener("click", function () {
        var value = mobileLink && mobileLink.dataset.fullLink ? mobileLink.dataset.fullLink : getCurrentPortalLink();
        if (!value) {
          fallbackCopyLink();
          return;
        }

        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          navigator.clipboard.writeText(value).then(function () {
            if (mobileCopyStatus) {
              mobileCopyStatus.textContent = "Link copied.";
            }
          }).catch(fallbackCopyLink);
          return;
        }

        fallbackCopyLink();
      });
    }

    window.addEventListener("resize", syncMobileBlock);
    syncMobileBlock();
  })();
</script>
