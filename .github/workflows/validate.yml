name: Validate

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate repo
        env:
          VALIDATE_ALLOW_RUNTIME_CHANGES: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.body, 'Runtime files changed: yes') && '1' || '' }}
        run: npm run validate
