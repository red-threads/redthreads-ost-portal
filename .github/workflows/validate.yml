name: Validate

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate repo
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run validate

      - name: Validate pull request
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if grep -q 'Runtime files changed: yes' "$GITHUB_EVENT_PATH"; then
            VALIDATE_ALLOW_RUNTIME_CHANGES=1 npm run validate
          else
            npm run validate
          fi
